<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Background shield shape -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C1121F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD60A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4A107;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M10,10 L70,10 L70,50 Q70,72 40,75 Q10,72 10,50 Z" fill="url(#shieldGrad)" stroke="#FFD60A" stroke-width="2"/>

  <!-- Inner shield detail -->
  <path d="M17,17 L63,17 L63,50 Q63,67 40,70 Q17,67 17,50 Z" fill="none" stroke="#FFD60A" stroke-width="1" opacity="0.5"/>

  <!-- Lightning bolt inside shield -->
  <path d="M44,22 L33,42 L40,42 L36,60 L51,37 L44,37 Z" fill="url(#goldGrad)" stroke="#C1121F" stroke-width="0.5"/>

  <!-- Club name text -->
  <text x="82" y="32" font-family="'Georgia', serif" font-size="20" font-weight="bold" fill="#E63946" letter-spacing="1">SK</text>
  <text x="82" y="52" font-family="'Georgia', serif" font-size="14" font-weight="bold" fill="#1A1A2E" letter-spacing="3">THUNDER</text>
  <text x="82" y="67" font-family="'Arial', sans-serif" font-size="9" fill="#666" letter-spacing="4">SPORTSKI KLUB</text>

  <!-- Decorative line -->
  <line x1="82" y1="56" x2="190" y2="56" stroke="#E63946" stroke-width="1" opacity="0.4"/>
</svg>
